**Last Updated: March 12, 2026**

### **English Version**

### **1. Introduction**

This Privacy Policy describes how CROPPY ("the Application") handles user data. CROPPY is a desktop application designed to batch resize and crop images, with integration for Google Drive and Google Sheets.

### **2. Information We Collect**

The Application accesses and collects the following types of information only after you provide explicit permission through Google OAuth:

- **Google Account Information**: Your email address and basic profile information to authenticate your connection.
- **Google Drive Data**: Metadata and content of image files within folders you specifically select for processing.
- **Google Sheets Data**: The ability to create or update spreadsheets for the purpose of logging processing results.

### **3. How We Use Information**

We use the information we collect for the following purposes:

- **Image Processing**: To retrieve images from selected Google Drive folders, apply resizing/cropping, and save the results back to your Drive.
- **Logging**: To record processing results (filenames, dimensions, success/fail status) in a Google Sheet for your reference.
- **Service Improvement**: To ensure the Application functions correctly on your local machine.

### **4. Google API Disclosure (Limited Use)**

CROPPY's use and transfer to any other app of information received from Google APIs will adhere to the [**Google API Services User Data Policy**](https://developers.google.com/terms/api-services-user-data-policy), including the Limited Use requirements.

- We do not share your Google user data with any third-party AI models or other third parties, except as necessary to provide the core functionality of the Application.
- We do not use your data for advertising purposes.
- We do not store your images or account data on any external servers. All processing is initiated from your local device.

### **5. Information Sharing and Disclosure**

We do not sell, trade, or otherwise transfer your personally identifiable information to outside parties. Your data remains between your local machine and your personal Google account.

### **6. Data Security**

The Application uses industry-standard OAuth 2.0 for authentication. Access tokens are stored securely on your local machine and are never transmitted to us or any third party.

### **7. Contact Us**

If you have any questions about this Privacy Policy, please contact the developer:

- **Name/Company**: [Your Name or Company Name]
- **Email**: [Your Email Address]

- **ログ記録**: 処理結果（ファイル名、サイズ、成否など）を Google スプレッドシートに記録するため。
